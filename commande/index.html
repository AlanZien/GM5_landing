<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commander ma plaque NFC — GiveMe5</title>
<meta name="description" content="Commandez votre plaque NFC GiveMe5 : 49 €, sans abonnement, valable à vie, livrée sous 4 jours.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f0b400;--gold-soft:#ffca28;--gold-deep:#a67300;--star:#fbbc04;
  --ink:#23232e;--navy:#2e2e3a;--body:#565660;--honey:#fff7e0;--line:#f0e6cb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito Sans',sans-serif;color:var(--ink);line-height:1.6;font-size:17px;
  background:linear-gradient(165deg,#fffdf6 0%,#fff3cf 58%,#ffe9a8 100%);min-height:100vh;
  display:flex;flex-direction:column}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
:focus-visible{outline:3px solid rgba(240,180,0,.65);outline-offset:3px;border-radius:6px}

header{padding:18px 24px;display:flex;align-items:center;justify-content:center;gap:12px}
header img{height:52px;width:auto}
header .wordmark{font-family:'Poppins',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-1px}
header .wordmark b{color:var(--gold)}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:#fff;border:1px solid var(--line);border-radius:26px;max-width:520px;width:100%;
  padding:40px 34px;text-align:center;box-shadow:0 30px 70px rgba(35,35,46,.14)}
.eyebrow{font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:2.5px;font-weight:700;
  font-size:.8rem;color:var(--gold-deep)}
h1{font-family:'Poppins',sans-serif;font-size:clamp(1.5rem,5vw,1.9rem);font-weight:900;
  line-height:1.2;letter-spacing:-.02em;margin:10px 0 18px}
.photo{margin:0 auto 10px;max-height:300px;width:auto}
.stars{color:var(--star);font-size:1.2rem;letter-spacing:3px;margin-bottom:16px}
.price{font-family:'Poppins',sans-serif;font-size:2.6rem;font-weight:900;line-height:1}
.price small{font-size:1rem;font-weight:700;color:var(--body)}
.assure{list-style:none;display:flex;flex-direction:column;gap:8px;margin:22px auto;
  width:fit-content;text-align:left}
.assure li{display:flex;align-items:center;gap:10px;font-weight:700;font-size:.98rem}
.assure li:before{content:"✓";flex:none;width:21px;height:21px;border-radius:50%;background:var(--gold);
  color:var(--ink);font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center}
.btn{display:block;font-family:'Poppins',sans-serif;background:var(--gold);color:var(--ink);
  font-weight:700;font-size:1.08rem;padding:18px 28px;border-radius:40px;
  box-shadow:0 10px 26px rgba(240,180,0,.45);transition:transform .18s ease,box-shadow .18s ease}
.btn:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(240,180,0,.6)}
.secure{font-size:.85rem;color:var(--body);margin-top:12px}
.more{display:inline-block;margin-top:20px;font-weight:700;font-size:.92rem;color:var(--gold-deep)}
.more:hover{text-decoration:underline}

footer{padding:20px;text-align:center;font-size:.85rem;color:var(--body)}
footer a{color:var(--gold-deep);font-weight:700}

@media(prefers-reduced-motion:reduce){.btn{transition:none}}
</style>
</head>
<body>

<header>
  <img src="../assets/img/logo-gm5.png" alt="GiveMe5">
  <span class="wordmark">GiveMe<b>5</b></span>
</header>

<main>
  <div class="box">
    <span class="eyebrow">Suite à notre échange</span>
    <h1>Commandez votre plaque NFC GiveMe5</h1>
    <img class="photo" src="../assets/img/plaque-49.jpg" alt="Plaque NFC GiveMe5 avec QR code — 49 €">
    <div class="stars" aria-hidden="true">★★★★★</div>
    <div class="price">49 € <small>· paiement unique</small></div>
    <ul class="assure">
      <li>Sans abonnement</li>
      <li>Valable à vie</li>
      <li>Livrée sous 4 jours</li>
    </ul>
    <a class="btn" href="https://buy.stripe.com/4gwaFi4IL4aoaRO6oq" target="_blank" rel="noopener">Commander ma plaque NFC — 49 €</a>
    <p class="secure">Paiement sécurisé par Stripe</p>
    <a class="more" href="../">Voir la présentation complète →</a>
  </div>
</main>

<footer>
  © 2026 GiveMe5 · <a href="../mentions-legales.html">Mentions légales</a>
</footer>

</body>
</html>
